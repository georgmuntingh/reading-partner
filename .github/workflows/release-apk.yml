name: Build and Release Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Build web bundle and sync to Android
        run: npm run cap:sync

      - name: Decode signing keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 secret is not set" >&2
            exit 1
          fi
          KS_PATH="$RUNNER_TEMP/release.jks"
          echo "$KEYSTORE_BASE64" | base64 -d > "$KS_PATH"
          echo "path=$KS_PATH" >> "$GITHUB_OUTPUT"

      - name: Derive version metadata
        id: version
        run: |
          REF_NAME="${GITHUB_REF_NAME}"
          # Strip leading 'v' from a tag like v1.2.3 for versionName; use run number as versionCode.
          VERSION_NAME="${REF_NAME#v}"
          if [ -z "$VERSION_NAME" ] || [ "$VERSION_NAME" = "$GITHUB_REF_NAME" ] && [ "${GITHUB_EVENT_NAME}" != "push" ]; then
            VERSION_NAME="0.0.0-${GITHUB_RUN_NUMBER}"
          fi
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_VERSION_NAME: ${{ steps.version.outputs.name }}
          ANDROID_VERSION_CODE: ${{ steps.version.outputs.code }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Stage APK artifact
        id: stage
        run: |
          SRC="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$SRC" ]; then
            echo "Release APK not found at $SRC" >&2
            ls -la android/app/build/outputs/apk/release/ || true
            exit 1
          fi
          OUT="$RUNNER_TEMP/reading-partner.apk"
          cp "$SRC" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: reading-partner-apk
          path: ${{ steps.stage.outputs.path }}

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.stage.outputs.path }}
          fail_on_unmatched_files: true
